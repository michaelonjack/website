application: onjackwebsite
version: 1
runtime: python27
api_version: 1
threadsafe: true

handlers:
- url: /fonts
  static_dir: fonts
- url: /js
  static_dir: js
- url: /stylesheets 
  static_dir: stylesheets
- url: /images
  static_dir: images
- url: /.*
  script: website.application

libraries:
- name: jinja2
  version: latest
  
inbound_services:
- mail
