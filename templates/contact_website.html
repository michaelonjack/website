<!DOCTYPE html>
<html lang="en">
<head>
    <title>
        michaelonjack
    </title>

    <meta charset="utf-8">

    <link rel="stylesheet" type="text/css" href="/stylesheets/website.css">
    <link rel="stylesheet" type="text/css" href="/stylesheets/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Lato:100,300,400">
    <script type="text/javascript" src="/js/jquery-3.1.1.min.js"></script>
    <script type="text/javascript" src="/js/bootstrap.min.js"></script>
</head>

<body class="main-body-light">
    <div class="container-fluid">
        <div id="title" class="row text-left" style="margin-top: 2em; margin-bottom: 2em;"">
            <div class="col-xs-12 col-md-12">
                <p style="font-size:4.5vw;">michael onjack</p>
            </div>
        </div>
        <div id="content" class="row text-left" style="display:flex;">
            <div id="nav" class="col-xs-3 col-md-3" style="position:relative;">
                <div class="row">
                    <div class="col-xs-12 col-md-12">
                        <a class="nav-link-alt" href="https://github.com/michaelonjack"><p>github</p></a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xs-12 col-md-12">
                        <a class="nav-link-alt" href=""><p>projects</p></a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xs-12 col-md-12">
                        <a class="nav-link-alt nav-link-current" href="/contact"><p>contact</p></a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xs-12 col-md-12">
                        <a class="nav-link-alt" href="/info"><p>information</p></a>
                    </div>
                </div>
                <div class="row" style="position: absolute; bottom: 0;">
                    <div class="col-xs-12 col-md-12">
                        <img src="/images/stripe.png" style="max-width: 60%;">
                    </div>
                </div>
            </div>
            <div class="col-xs-9 col-md-9">
                <form>
                    <div class="form-group row">
                        <div class="col-xs-5 col-md-5">
                            <input type="text" class="form-control" id="firstName" name="firstName" aria-describedby="firstNameSub" required>
                            <small id="firstNameSub" class="form-text text-muted">First Name</small>
                        </div>
                        <div class="col-xs-5 col-md-5">
                            <input type="text" class="form-control" id="lastName" name="lastName" aria-describedby="lastNameSub" required>
                            <small id="lastNameSub" class="form-text text-muted">Last Name</small>
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col-xs-10 col-md-10">
                            <input type="email" class="form-control" id="email" name="email" aria-describedby="emailSub" required>
                            <small id="emailSub" class="form-text text-muted">Email</small>
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col-xs-10 col-md-10">
                            <input type="text" class="form-control" id="subject" name="subject" aria-describedby="subjectSub" required>
                            <small id="subjectSub" class="form-text text-muted">Subject</small>
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col-msm-10 col-md-10">
                            <textarea class="form-control" id="message" name="message" rows="6" aria-describedby="messageSub" required></textarea>
                            <small id="messageSub" class="form-text text-muted">Message</small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mb-2">Submit</button>
                </form>
            </div>
        </div>
        <div class="row text-right">
            <div class="col-md-12">
                <a href="/"><p style="font-size:6em;">*</p></a>
            </div>
        </div>
    </div>
</body>

</html>
