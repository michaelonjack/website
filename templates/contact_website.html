<!DOCTYPE html>
<html>
<head>
	<title>
		contact
	</title>

	<meta charset="utf-8">

	<link rel="stylesheet" type="text/css" href="/stylesheets/website.css">
	<link rel="stylesheet" type="text/css" href="/stylesheets/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="http://fonts.googleapis.com/css?family=Lato:100,300,400">
	<script type="text/javascript" src="/js/jquery-3.1.1.min.js"></script>
	<script type="text/javascript" src="/js/bootstrap.min.js"></script>
	<script type="text/javascript">
   		function toggle_visibility(id) {
       		var e = document.getElementById(id);
    		e.style.display = (e.style.display == 'inline-block') ? 'none' : 'inline-block';
   		}
	</script>
</head>
<body class="main-body">
	<div class="container-fluid">
		<div class="navigator-menu-button-container">
            <input type='image' src='/images/menu.png' id='hideshow' alt='hide/show' width='48' height='48' onclick="toggle_visibility('left');">
        </div>
        <div class="navigator-menu" id="left">
            <br><b>MENU</b><br><br>
            <a href="http://www.github.com/michaelonjack">GITHUB</a><br><br>
            <a href="/info">INFORMATION</a><br><br>
            <a href="/samples">SAMPLES</a><br><br>
            <a href="/contact">CONTACT</a><br><br>
            <a href="/roommates">ROOMMATES</a>
        </div>

        <div class="row" style="margin:70px 0px 40px 0px;">
        	<div class="col-xs-12 col-md-12 text-center">
        		<h1 style="font-weight:lighter; font-size: 3.5em;">
                    contact
                    <hr style="height:.03em; width:2.5em; border: none; color:gray; background-color: gray;">
                </h1>
        	</div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                My name is Michael Onjack.
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                You can call me at 610-762-1106
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                Or email me at mikeonjack@gmail.com.
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                I currently live in Arlington, Virginia.
            </div>
        </div>
        <div class="row" style="margin:40px 0px 0px 0px;">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
            	You can also contact me directly by using this form.
            </div>
        </div>
        <div class="row" style="margin:40px 0px 0px 0px;">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left">
            	<form method="post">
            		<div class="form-group" style="margin:0px 0px 30px 0px;">
            			<label for="senderEmail" style="font-size:220%; font-weight:lighter;">Email address</label>
            			<input type="text" id="senderEmail" class="form-control" name="sender" value="{{sender}}" placeholder="Enter email">
            		</div>
            		<div class="form-group" style="margin:0px 0px 30px 0px;">
            			<label for="subject" style="font-size:220%; font-weight:lighter;">Subject</label>
            			<input type="text" id="subject" class="form-control" name="title" value="{{title}}" placeholder="Enter subject">
            		</div>
            		<div class="form-group" style="margin:0px 0px 30px 0px;">
            			<label for="message" style="font-size:220%; font-weight:lighter;">Message</label>
            			<textarea id="message" class="form-control" name="body" rows="5">{{body}}</textarea>
            		</div>
            	</form>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12 col-md-12 text-center" style="font-size:220%; font-weight:lighter; margin:90px 0px 50px 0px;">
                <a href="/">home</a>
            </div>
        </div>
	</div>
</body>
</html>
