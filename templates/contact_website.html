<!DOCTYPE html>
<html>
<head>
	<title>
		contact
	</title>

	<meta charset="utf-8">

	<link rel="stylesheet" type="text/css" href="/stylesheets/website.css">
	<link rel="stylesheet" type="text/css" href="/stylesheets/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Lato:100,300,400">
	<script type="text/javascript" src="/js/jquery-3.1.1.min.js"></script>
	<script type="text/javascript" src="/js/bootstrap.min.js"></script>
</head>
<body class="main-body">
    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#"></a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="/">home</a></li>
                <li><a href="https://www.github.com/michaelonjack">github</a></li>
                <li><a href="/info">info</a></li>
                <li><a href="/samples">samples</a></li>
                <li class="active"><a href="#">contact</a></li>
            </ul>
        </div>
    </nav>
	<div class="container-fluid">
        <div class="row" style="margin-bottom:3em;">
        	<div class="col-xs-12 col-md-12 text-center">
        		<h1 style="font-weight:lighter; font-size: 3.5em;">
                    contact
                    <hr style="height:.03em; width:2.5em; border: none; color:gray; background-color: gray;">
                </h1>
        	</div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                My name is Michael Onjack
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                You can call me at 610.762.1106
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                Or email me at mikeonjack@gmail.com
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
                I currently live in Arlington, Virginia
            </div>
        </div>
        <div class="row" style="margin-top:2em; margin-bottom:1em;">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-11 col-md-11 text-left" style="font-size:220%; font-weight:lighter;">
            	You can also contact me directly by using this form
            </div>
        </div>
        <div class="row">
            <div class="col-xs-1 col-md-1"></div>
            <div class="col-xs-5 col-md-5 text-left">
            	<form method="post">
            		<div class="form-group" style="margin:0px 0px 10px 0px;">
            			<input type="text" id="senderEmail" class="form-control" name="sender" value="{{sender}}" placeholder="email">
            		</div>
            		<div class="form-group" style="margin:0px 0px 10px 0px;">
            			<input type="text" id="subject" class="form-control" name="title" value="{{title}}" placeholder="subject">
            		</div>
            		<div class="form-group" style="margin:0px 0px 20px 0px;">
            			<textarea id="message" class="form-control" name="body" rows="3" cols="1">{{body}}</textarea>
            		</div>
            		<button type="submit" class="btn btn-primary">send</button>
            	</form>
            </div>
        </div>
        <div class="row" style="margin:50px 0px 0px 0px;">
        	<div class="col-xs-1 col-md-1"></div>
        	<div class="col-xs-11 col-md-11 text-left">
        		<div name="error" style="font-size:220%; font-weight:normal; color:#FA5858">{{error}}</div>
        	</div>
        	<div class="col-xs-1 col-md-1"></div>
        </div>
	</div>
</body>
</html>
